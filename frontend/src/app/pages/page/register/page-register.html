<!-- BEGIN register -->
<div class="register">
	<!-- BEGIN register-content -->
	<div class="register-content">
		<form #f="ngForm" (ngSubmit)="formSubmit(f)">
			<h1 class="text-center">Sign Up</h1>
			<p class="text-muted text-center">Create your Prevello account to get started.</p>

			@if (errorMessage) {
				<div class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
					{{ errorMessage }}
					<button type="button" class="btn-close" (click)="errorMessage = ''" aria-label="Close"></button>
				</div>
			}

			<div class="row mb-3">
				<div class="col-6">
					<label class="form-label">First Name <span class="text-danger">*</span></label>
					<input type="text" class="form-control form-control-lg fs-15px"
						[(ngModel)]="firstName" name="firstName" required
						placeholder="First name"
						[disabled]="isLoading">
				</div>
				<div class="col-6">
					<label class="form-label">Last Name <span class="text-danger">*</span></label>
					<input type="text" class="form-control form-control-lg fs-15px"
						[(ngModel)]="lastName" name="lastName" required
						placeholder="Last name"
						[disabled]="isLoading">
				</div>
			</div>
			<div class="mb-3">
				<label class="form-label">Email Address <span class="text-danger">*</span></label>
				<input type="email" class="form-control form-control-lg fs-15px"
					[(ngModel)]="email" name="email" required email
					placeholder="username@address.com"
					[disabled]="isLoading">
			</div>
			<div class="mb-3">
				<label class="form-label">Password <span class="text-danger">*</span></label>
				<input type="password" class="form-control form-control-lg fs-15px"
					[(ngModel)]="password" name="password" required minlength="8"
					[disabled]="isLoading">
			</div>
			<div class="mb-3">
				<label class="form-label">Confirm Password <span class="text-danger">*</span></label>
				<input type="password" class="form-control form-control-lg fs-15px"
					[(ngModel)]="confirmPassword" name="confirmPassword" required minlength="8"
					[disabled]="isLoading">
			</div>
			<div class="mb-3">
				<div class="form-check">
					<input class="form-check-input" type="checkbox"
						[(ngModel)]="agreeTerms" name="agreeTerms" id="customCheck1">
					<label class="form-check-label fw-500" for="customCheck1">I have read and agree to the <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>.</label>
				</div>
			</div>
			<div class="mb-3">
				<button type="submit" class="btn btn-theme btn-lg fs-15px fw-500 d-block w-100"
					[disabled]="isLoading || !f.valid">
					@if (isLoading) {
						<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
						Creating account...
					} @else {
						Sign Up
					}
				</button>
			</div>
			<div class="text-muted text-center">
				Already have an account? <a routerLink="/login">Sign In</a>
			</div>
		</form>
	</div>
	<!-- END register-content -->
</div>
<!-- END register -->
