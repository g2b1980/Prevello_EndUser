<!-- BEGIN login -->
<div class="login">
	<!-- BEGIN login-content -->
	<div class="login-content">
		<form #f="ngForm" (ngSubmit)="formSubmit(f)">
			<h1 class="text-center">Sign In</h1>
			<div class="text-muted text-center mb-4">
				For your protection, please verify your identity.
			</div>

			@if (errorMessage) {
				<div class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
					{{ errorMessage }}
					<button type="button" class="btn-close" (click)="errorMessage = ''" aria-label="Close"></button>
				</div>
			}

			<div class="mb-3">
				<label class="form-label">Email Address</label>
				<input type="email" class="form-control form-control-lg fs-15px"
					[(ngModel)]="email" name="email" required email
					placeholder="username@address.com"
					[disabled]="isLoading">
			</div>
			<div class="mb-3">
				<div class="d-flex">
					<label class="form-label">Password</label>
					<a href="#" class="ms-auto text-muted">Forgot password?</a>
				</div>
				<input type="password" class="form-control form-control-lg fs-15px"
					[(ngModel)]="password" name="password" required minlength="8"
					placeholder="Enter your password"
					[disabled]="isLoading">
			</div>
			<div class="mb-3">
				<div class="form-check">
					<input class="form-check-input" type="checkbox"
						[(ngModel)]="rememberMe" name="rememberMe" id="customCheck1">
					<label class="form-check-label fw-500" for="customCheck1">Remember me</label>
				</div>
			</div>
			<button type="submit" class="btn btn-theme btn-lg d-block w-100 fw-500 mb-3"
				[disabled]="isLoading || !f.valid">
				@if (isLoading) {
					<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
					Signing in...
				} @else {
					Sign In
				}
			</button>

			<div class="text-center mb-3">
				<span class="text-muted">or</span>
			</div>

		<button type="button" class="btn btn-outline-primary btn-lg d-block w-100 fw-500 mb-3"
			(click)="loginWithEntra()" [disabled]="isLoading || isEntraLoading">
			@if (isEntraLoading) {
				<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
				Signing in with Microsoft...
			} @else {
				<i class="fab fa-microsoft me-2"></i> Sign in with Microsoft
			}
		</button>

			<div class="text-center text-muted">
				Don't have an account yet? <a routerLink="/register">Sign up</a>.
			</div>
		</form>
	</div>
	<!-- END login-content -->
</div>
<!-- END login -->
